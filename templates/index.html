<!DOCTYPE html>
<html>

<head>

    <title>PDF Extractor</title>

    <style>
        body {

            font-family: Arial, sans-serif;
            text-align: center;

            margin-top: 100px;

        }

        #loading {

            display: none;

            position: fixed;

            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            background: white;

            justify-content: center;
            align-items: center;
            flex-direction: column;

            z-index: 9999;

        }

        .spinner {

            width: 60px;
            height: 60px;

            border: 6px solid #ddd;
            border-top: 6px solid #007bff;

            border-radius: 50%;

            animation: spin 1s linear infinite;

            margin-bottom: 20px;

        }

        @keyframes spin {

            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }

        }
    </style>

</head>

<body>

    <h1>Upload PDF</h1>

    <form action="/upload" method="POST" enctype="multipart/form-data" onsubmit="showLoading()">

        <input type="file" name="pdf" accept=".pdf" required>

        <br><br>

        <button type="submit">
            Extract PDF
        </button>

    </form>

    <div id="loading">

        <div class="spinner"></div>

        <h2>
            Processing PDF...
        </h2>

        <p>
            First run may take several minutes while Marker loads models.
        </p>

        <p>
            Please do not close this page.
        </p>

    </div>

    <script>

        function showLoading() {

            document
                .getElementById("loading")
                .style
                .display = "flex";

        }

    </script>

</body>

</html>
