<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>
        Extracted PDF
    </title>

    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$']],
                displayMath: [['$$', '$$']]
            }
        };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        /* Top Header */
        .top-header {
            background: #1f2937;
            color: white;
            padding: 15px 25px;
            font-size: 20px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .container {
            display: flex;
            height: calc(100vh - 60px);
            /* Subtract header height */
        }

        .left {
            width: 50%;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }

        .right {
            width: 50%;
            overflow-y: auto;
            padding: 20px;
            background: #fafafa;
            line-height: 1.6;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .toolbar {
            padding: 10px 20px;
            background: #f5f5f5;
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .toolbar a,
        .toolbar button {
            padding: 8px 15px;
            cursor: pointer;
            text-decoration: none;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: white;
            font-size: 14px;
            transition: background 0.2s;
        }

        .toolbar a:hover,
        .toolbar button:hover {
            background: #e9e9e9;
        }

        .toolbar a {
            color: #1f2937;
        }

        #content {
            padding-right: 10px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        table,
        th,
        td {
            border: 1px solid #ccc;
        }

        th,
        td {
            padding: 8px;
        }

        img {
            max-width: 100%;
        }

        .pdf-wrapper {
            flex: 1;
            overflow: hidden;
        }

        .pdf-filename {
            margin-left: auto;
            color: #666;
            font-size: 12px;
            background: #e9e9e9;
            padding: 4px 10px;
            border-radius: 12px;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>

</head>

<body>

    <!-- Top Header -->
    <div class="top-header">
        🤖 AI PDF Research Extractor
    </div>

    <div class="container">

        <div class="left">

            <!-- Toolbar for the left panel -->
            <div class="toolbar">

                <a href="/download/md">
                    📥 Download MD
                </a>

                <button onclick="copyText()">
                    📋 Copy Text
                </button>

                <span class="pdf-filename">
                    📄 {{ pdf_file }}
                </span>

            </div>

            <!-- PDF Viewer -->
            <div class="pdf-wrapper">
                <iframe src="/pdf/{{ pdf_file }}">
                </iframe>
            </div>

        </div>

        <div class="right">

            <h2 style="margin-top:0;">
                Extracted Content
            </h2>

            <div id="content">

                {{ html_content|safe }}

            </div>

        </div>

    </div>

    <script>

        function copyText() {

            // Get the text content from the right panel
            const contentDiv = document.getElementById("content");

            // Use innerText to get plain text (no HTML tags)
            const textToCopy = contentDiv.innerText;

            navigator.clipboard.writeText(textToCopy)
                .then(() => {
                    alert("✅ Text copied to clipboard!");
                })
                .catch(err => {
                    console.error("Copy failed:", err);
                    alert("❌ Failed to copy text. Please try again.");
                });

        }

    </script>

</body>

</html>
